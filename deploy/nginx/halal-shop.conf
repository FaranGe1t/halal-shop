# Пример site-конфига для Halal Shop на VPS.
# Скопируйте в /etc/nginx/sites-available/halal-shop
# и включите: sudo ln -s /etc/nginx/sites-available/halal-shop /etc/nginx/sites-enabled/
#
# Пути и порт бэкенда подставьте под свой сервер.

server {
    listen 80;
    server_name example.com;

    # Корень статики (frontend) — при необходимости измените путь
    root /var/www/halal_shop/frontend;
    index index.html;

    # Кэширование картинок и статики на 30 дней
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri @backend;
    }

    # Загрузки товаров (если отдаются с диска через Nginx)
    location /uploads/ {
        alias /var/www/halal_shop/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location / {
        try_files $uri $uri/ @backend;
    }

    location @backend {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
